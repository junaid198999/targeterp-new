{% load i18n %}
{% load widget_tweaks %}
{% load crispy_forms_tags %}
{% block content %}

    <form  align="left" id="citiesForm" method="post" action="#"  novalidate>
	{% csrf_token %}
    <div class="modal-header" style="background: #f1556c;">
      <h3 class="modal-title" style="color: white;">{% trans "Delete Cities" %}</h3>
      <button style="color:white; font-size: 2rem;" type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>

		<div class="modal-body">
		<p class="lead"> {% trans "Are you sure you want to delete this Cities" %}: <strong>{{object.name}}</strong></p>
		</div>
		<div class="modal-footer">
		<button type="button" class="btn btn-secondary" data-dismiss="modal">{% trans "Close" %}</button>
		<button type="submit" class="btn btn-danger">{% trans "Delete" %}</button>
		</div>
</form>
{% endblock %}

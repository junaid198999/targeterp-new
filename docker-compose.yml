version: '3'

services:
  web:
    build: .
    container_name: TargetApp
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - target_app:/target_app
    ports: 
      - "80:8000"
    depends_on:
      - db
  db:
    image: postgres
    container_name: Postgres_DB
    environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: Samer.1975
       POSTGRES_DB: target_appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    expose:
       - "5432" 
volumes:
  postgres_data:
  target_app:

{% csrf_token %}

<script type="text/javascript">
    var formjson = [];

var userData = {
 storeUserDataInSession: function(userData) {
     var userObjectString = JSON.stringify(userData);
     window.sessionStorage.setItem('userObject',userObjectString)
 },
 getUserDataFromSession: function() {
     var userData = window.sessionStorage.getItem('userObject')
     return JSON.parse(userData);

 }
}

function urlChange() {

    console.log( "{{ rep_id }}");
    var site = "{% url 'rp:view_reportview'   %}  ";
    console.log(site);
    parent.document.getElementById('prev_id').src = site;


    //formjson =window.localStorage.getItem("formjson");
    formjson = userData.getUserDataFromSession()
//    console.log(formjson);


    var csrftoken = $("[name=csrfmiddlewaretoken]").val();
  //  console.log(csrftoken);
    $.ajax({
        url: "{% url 'rp:view_reportview'   %}",
        type: "POST",
        headers:{ "X-CSRFToken": csrftoken },
        cache: true,

        data:formjson,
        //dataType:"json",

        success:function(response){},
        complete:function(){},
        error:function (xhr, textStatus, thrownError){
             }
    });


}



</script>

{% load i18n %}
{% load widget_tweaks %}
{% load crispy_forms_tags %}
{% block content %}

    <form  align="left" method="post" action="#"  novalidate>
	{% csrf_token %}
    <div class="modal-header bg-success">
      <h3 class="modal-title" style="color: white;">{% trans "Convert Lead" %}</h3>
      <button style="color:white; font-size: 2rem;" type="button" class="close" data-dismiss="modal" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>


		<span aria-hidden="true">&times;</span>

		<div class="modal-body">
		<p class="lead"> {% trans "Are you sure you want to Convert Lead" %}: <strong>{{lead.name}}</strong> into Customer?</p>
		</div>
		<div class="modal-footer">
		<button type="button" class="btn btn-secondary" data-dismiss="modal">{% trans "Close" %}</button>
		<button type="submit" class="btn btn-success">{% trans "Convert" %}</button>
		</div>
</form>
{% endblock %}
